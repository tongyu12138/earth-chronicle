name: Deploy approved media CDN

on:
  push:
    branches:
      - main
    paths:
      - "media/public/**"
      - "data/media-catalog.js"
      - "config/media.js"
      - ".github/workflows/deploy-media.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-media
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate release media gate and rights metadata
        run: node scripts/validate-media.js --release
      - name: Stage only approved public media
        run: node scripts/stage-media-site.js
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify every deployed media URL
        env:
          MEDIA_PUBLIC_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: node scripts/verify-deployed-media.js
